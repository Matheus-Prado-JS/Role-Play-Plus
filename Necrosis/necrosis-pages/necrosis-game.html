<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Necrosis - Game</title>

    <link rel="stylesheet"
          href="../necrosis-styles/Necrosis-Game.css">
    <link rel="stylesheet"
      href="../necrosis-styles/necrosis-player.css">
          <link rel="stylesheet"
      href="../necrosis-styles/necrosis-map.css">

</head>
<body>

    <div class="backgroundGlow"></div>

    <header class="gameHeader">

        <img
            src="../necrosis-assets/logo.png"
            alt="Necrosis"
            class="gameLogo"
        >

    </header>

<button
    id="menuToggle"
    class="menuToggle"
>
    ☰
</button>

<button
    id="moderatorToggle"
    class="moderatorToggle"
>
    ◆
</button>

<aside
    id="controlMenu"
    class="controlMenu"
>

    <h2>Controle</h2>

    <button
        id="profileButton"
        class="menuButton"
    >
        Perfil
    </button>

    <button
        id="cooperatorsButton"
        class="menuButton"
    >
        Cooperadores
    </button>

<button
    id="mapButton"
    class="menuButton"
>
    Mapa
</button>

<div
    id="mapSubmenu"
    class="mapSubmenu"
>

    <button
        class="mapLocation"
        data-map="Grayford"
    >
        Mansão Grayford
    </button>

    <button
        class="mapLocation"
        data-map="Sewer"
    >
        Canal de Esgoto
    </button>

</div>

    <button class="menuButton">
        Anotações
    </button>

    <button class="menuButton">
        Dados
    </button>

</aside>

<aside
    id="moderatorMenu"
    class="moderatorMenu"
>

    <h2>Moderador</h2>

    <button class="moderatorButton">
        Background
    </button>

    <button class="moderatorButton">
        Playlist
    </button>

    <button class="moderatorButton">
        Itens
    </button>

    <button class="moderatorButton">
        Armas
    </button>

    <button class="moderatorButton">
        Documentos
    </button>

</aside>

<!-- ========================= -->
<!-- PAINEL PERFIL             -->
<!-- ========================= -->

<section
    id="profilePanel"
    class="playerPanel"
>

    <button
        id="closeProfilePanel"
        class="closePlayerPanel"
    >
        ✕
    </button>

    <h2>Perfil</h2>

    <div
        id="profileContent"
        class="profileContent"
    ></div>

</section>


<!-- ========================= -->
<!-- PAINEL COOPERADORES       -->
<!-- ========================= -->

<section
    id="cooperatorsPanel"
    class="playerPanel"
>

    <button
        id="closeCooperatorsPanel"
        class="closePlayerPanel"
    >
        ✕
    </button>

    <h2>Cooperadores</h2>

    <div
        id="cooperatorsContent"
        class="cooperatorsContent"
    ></div>

</section>

<!-- ========================= -->
<!-- PAINEL MAPA               -->
<!-- ========================= -->

<section
    id="mapPanel"
    class="mapPanel"
>

    <button
        id="closeMapPanel"
        class="closeMapPanel"
    >
        ✕
    </button>

    <div class="floorSelector">

        <button
            class="floorButton active"
            data-floor="1F"
        >
            1F
        </button>

        <button
            class="floorButton"
            data-floor="2F"
        >
            2F
        </button>

        <button
            class="floorButton"
            data-floor="3F"
        >
            3F
        </button>

    </div>

        <div class="mapViewport">

            <div id="mapCanvas">

                <img
                    id="mapImage"
                    src="../necrosis-assets/maps/Grayford-1F.png"
                >

            </div>

        </div>

</section>

<main class="gameContent">

    <section class="gameSection">

        <div class="backgroundFrame">

            <p>
                Área de Background
            </p>

        </div>

    </section>

    <section class="gameSection baseSection">

        <h2>
            Sessão Base 1
        </h2>

        <p>
            Espaço reservado para conteúdo futuro.
        </p>

    </section>

    <section class="gameSection baseSection">

        <h2>
            Sessão Base 2
        </h2>

        <p>
            Espaço reservado para conteúdo futuro.
        </p>

    </section>

</main>

<script src="../necrosis-scripts/Necrosis-Game.js"></script>
<script src="../necrosis-scripts/necrosis-player.js"></script>
<script src="../necrosis-scripts/necrosis-map.js"></script>

</body>
</html>
