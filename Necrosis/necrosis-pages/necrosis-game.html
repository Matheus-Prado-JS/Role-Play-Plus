<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Necrosis - Game</title>

    <link rel="stylesheet"
          href="../necrosis-styles/Necrosis-Game.css">

</head>
<body>

    <div class="backgroundGlow"></div>

    <header class="gameHeader">

        <img
            src="../necrosis-assets/logo.png"
            alt="Necrosis"
            class="gameLogo"
        >

    </header>

<button
    id="menuToggle"
    class="menuToggle"
>
    ☰
</button>

<button
    id="moderatorToggle"
    class="moderatorToggle"
>
    ◆
</button>

<aside
    id="controlMenu"
    class="controlMenu"
>

    <h2>Controle</h2>

    <button class="menuButton">
        Sessão 01
    </button>

    <button class="menuButton">
        Sessão 02
    </button>

</aside>

<aside
    id="moderatorMenu"
    class="moderatorMenu"
>

    <h2>Moderador</h2>

    <button class="moderatorButton">
        Sessão 01
    </button>

    <button class="moderatorButton">
        Sessão 02
    </button>

</aside>
<main class="gameContent">

    <section class="gameSection">

        <div class="backgroundFrame">

            <p>
                Área de Background
            </p>

        </div>

    </section>

    <section class="gameSection baseSection">

        <h2>
            Sessão Base 1
        </h2>

        <p>
            Espaço reservado para conteúdo futuro.
        </p>

    </section>

    <section class="gameSection baseSection">

        <h2>
            Sessão Base 2
        </h2>

        <p>
            Espaço reservado para conteúdo futuro.
        </p>

    </section>

</main>
    <script src="../necrosis-scripts/Necrosis-Game.js"></script>

</body>
</html>
